<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reestar</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="container">
        <div class="head">
            <nav>
                <h1 class="head__title">Reestar</h1>
                <p>Home</p>
                <p>Recipe</p>
                <p>Contact</p>
            </nav>
        </div>
        <div class="img">
            <div class="briyani1">
                <img class="briyani1__img" src="briyani1.jpg" height="400px" width="200px">
                <p>Briyani </p>
                <button class="briyani1__button">order now </button>
            </div>
            <div class="pizza">
                <img class="pizza__img" src="pizza.jpeg" height="400px" width="200px">
                <p>Pizza</p>
                <button class="pizza__button">order now </button>
            </div>
            <div class="noodles">
                <img class="noodles__img" src="noodles.jpeg" height="400px" width="200px">
                <p>Noodles</p>
                <button class="noodles__button">order now </button>
            </div>
            <div class="friedrice">
                <img class="friedrice__img" src="friedrice.jpg" height="400px" width="200px">
                <p>Friedrice</p>
                <button class="friedrice__button">order now </button>
            </div>

        </div>
        <div class="contact">
            <h1>Contact Us</h1>
            <form>
                <table>
                    <tr>
                        <td> <label>Name:</label>
                        </td>
                        <td>
                            <input class="contact__name" type="text" placeholder="enter name ">

                        </td>

                    </tr>
                    <tr>
                        <td><label>Age:</label></td>
                        <td>
                            <input class="contact__age" type="number" placeholder="enter Age ">
                        </td>
                    </tr>
                    <tr>
                        <td><label>Gmail:</label></td>
                        <td>
                            <input class="contact__email" type="email" placeholder="enter email ">
                        </td>
                    </tr>

                </table>
            </form>
            <p class="send">Send</p>
        </div>
    </div>
</body>

</html>
